    <main class="container">
        <section class="contact-section">
            <h2>Get In Touch</h2>
            <p>Fill out the portal below for inquiries, collaborative academic efforts, or security review invitations.</p>
            
            <div id="errorMessage" class="error-box"></div>

            <form id="contactForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Digits only (e.g., 08012345678)">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your context here..."></textarea>
                </div>

                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </section>
    </main>
